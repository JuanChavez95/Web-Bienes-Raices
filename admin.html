<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Casas Chavez</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde:   #1a3a2a;
      --verde-m: #2d6a4f;
      --verde-c: #52b788;
      --oro:     #c9984c;
      --oro-c:   #e8d5a3;
      --rojo:    #dc2626;
      --rojo-bg: #3f0e0e;
      --bg:      #0f0f0f;
      --bg2:     #181818;
      --bg3:     #222;
      --borde:   #2a2a2a;
      --txt:     #e8e8e8;
      --txt2:    #888;
      --radio:   10px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; font-size: 14px; }
    a { color: var(--verde-c); }

    /* Topbar */
    .topbar {
      background: var(--verde); border-bottom: 2px solid var(--oro);
      padding: .7rem 1.4rem; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem; position: sticky; top: 0; z-index: 100;
    }
    .topbar h1 { font-size: 1rem; color: var(--oro-c); font-weight: 700; white-space: nowrap; }
    .topbar-right { display: flex; align-items: center; gap: .6rem; }
    #lastUpdate { font-size: .72rem; color: rgba(255,255,255,.4); }

    /* Layout */
    .layout { display: grid; grid-template-columns: 1fr 430px; gap: 1rem; padding: 1rem; min-height: calc(100vh - 52px); }

    /* Panel */
    .panel { background: var(--bg2); border: 1px solid var(--borde); border-radius: var(--radio); padding: 1.1rem; }
    .panel-title { font-size: .85rem; font-weight: 700; color: var(--oro-c); margin-bottom: .9rem; display: flex; align-items: center; gap: .5rem; }

    /* Filtros */
    .filtros { display: flex; gap: .5rem; margin-bottom: .8rem; flex-wrap: wrap; }

    /* Tabla */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    thead th { background: var(--verde); color: var(--oro-c); padding: .55rem .7rem; text-align: left; font-size: .75rem; letter-spacing: .04em; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--borde); cursor: pointer; transition: background .15s; }
    tbody tr:hover { background: var(--bg3); }
    tbody tr.activa { background: #1a3a2a !important; }
    tbody td { padding: .5rem .7rem; vertical-align: middle; white-space: nowrap; }
    .thumb { width: 38px; height: 38px; object-fit: cover; border-radius: 5px; border: 1px solid var(--borde); cursor: pointer; display: block; }
    .sin-img { color: var(--txt2); font-size: .7rem; }

    /* Badges */
    .badge { display: inline-block; font-size: .68rem; font-weight: 700; padding: .2rem .6rem; border-radius: 50px; letter-spacing: .04em; }
    .badge-pendiente { background: #3b2f00; color: #fbbf24; }
    .badge-aprobado  { background: #052e16; color: #86efac; }

    /* Detalle */
    .detail-wrap { display: flex; flex-direction: column; gap: 1rem; }
    .placeholder { background: var(--bg2); border: 1px solid var(--borde); border-radius: var(--radio); padding: 3rem 1rem; text-align: center; color: var(--txt2); font-size: .85rem; }
    #detailPanel { display: none; }

    /* Ficha */
    .ficha { background: var(--bg3); border-radius: 8px; padding: .9rem 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: .4rem .8rem; margin-bottom: .8rem; }
    .ficha-item .lbl { font-size: .68rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .04em; }
    .ficha-item .val { font-size: .88rem; color: var(--txt); word-break: break-word; }
    .ficha-item.full { grid-column: 1 / -1; }

    /* Comprobante */
    .comprobante-wrap { margin-bottom: .8rem; }
    .comprobante-wrap .lbl { font-size: .68rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .4rem; }
    .comprobante-img { max-height: 140px; border-radius: 7px; border: 1px solid var(--borde); cursor: pointer; display: block; transition: opacity .2s; }
    .comprobante-img:hover { opacity: .85; }

    /* Campos */
    .campo { margin-bottom: .85rem; }
    .campo label { display: block; font-size: .72rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
    input[type="text"], select, textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--borde);
      border-radius: 7px; color: var(--txt); font-family: inherit; font-size: .88rem;
      padding: .55rem .8rem; outline: none; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--oro); }
    input::placeholder, textarea::placeholder { color: var(--txt2); }

    /* Multi-select */
    .ms-wrap { border: 1px solid var(--borde); border-radius: 7px; background: var(--bg3); max-height: 170px; overflow-y: auto; padding: .4rem; }
    .ms-opt { display: flex; align-items: center; gap: .5rem; padding: .3rem .4rem; border-radius: 5px; cursor: pointer; transition: background .15s; }
    .ms-opt:hover:not(.ms-reservado) { background: var(--bg2); }
    .ms-opt input[type="checkbox"] { accent-color: var(--oro); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
    .ms-opt label { cursor: pointer; font-size: .83rem; color: var(--txt); flex: 1; }
    .ms-opt .ms-tipo { font-size: .68rem; color: var(--txt2); }

    /* Opción reservada — visual bloqueada */
    .ms-reservado { opacity: .55; cursor: not-allowed !important; background: var(--rojo-bg) !important; border-radius: 5px; }
    .ms-reservado label { cursor: not-allowed !important; color: #f87171; }
    .ms-reservado input[type="checkbox"] { cursor: not-allowed !important; }
    .badge-res { display: inline-block; font-size: .62rem; font-weight: 700; background: var(--rojo); color: #fff;
                 border-radius: 4px; padding: .1rem .4rem; letter-spacing: .04em; flex-shrink: 0; }

    /* Botones */
    .btn { display: inline-flex; align-items: center; gap: .4rem; border: none; border-radius: 8px; font-family: inherit; font-size: .83rem; font-weight: 600; padding: .6rem 1.1rem; cursor: pointer; transition: all .2s; text-decoration: none; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-verde { background: var(--verde-m); color: #fff; }
    .btn-verde:hover:not(:disabled) { background: var(--verde-c); color: var(--verde); }
    .btn-oro   { background: var(--oro); color: var(--verde); }
    .btn-oro:hover:not(:disabled) { background: var(--oro-c); }
    .btn-wa    { background: #16a34a; color: #fff; }
    .btn-wa:hover:not(:disabled) { background: #15803d; }
    .btn-gris  { background: var(--bg3); color: var(--txt2); border: 1px solid var(--borde); }
    .btn-gris:hover { background: #2f2f2f; color: var(--txt); }
    .btn-sm    { padding: .38rem .75rem; font-size: .78rem; border-radius: 6px; }
    .btn-full  { width: 100%; justify-content: center; }
    .acciones  { display: flex; flex-direction: column; gap: .6rem; }

    /* Spinner */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; background: var(--bg2); border: 1px solid var(--borde); border-radius: 12px; padding: .9rem 1.2rem; min-width: 260px; max-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.6); display: none; gap: .7rem; align-items: flex-start; }
    #toast.show { display: flex; animation: slideUp .25s ease; }
    .toast-icon  { font-size: 1.4rem; line-height: 1; }
    .toast-title { font-weight: 700; font-size: .9rem; margin-bottom: .15rem; }
    .toast-msg   { font-size: .78rem; color: var(--txt2); line-height: 1.4; }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Lightbox */
    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 9998; display: none; align-items: center; justify-content: center; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    #lb-close { position: absolute; top: 1rem; right: 1.2rem; font-size: 1.8rem; color: #fff; cursor: pointer; line-height: 1; }

    /* Separador sección */
    .seccion-sep { border: none; border-top: 1px solid var(--borde); margin: .6rem 0 1rem; }

    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <h1>🏠 Admin — Casas Chavez</h1>
  <div class="topbar-right">
    <span id="lastUpdate"></span>
    <button class="btn btn-gris btn-sm" onclick="cargarTodo()">↺ Actualizar</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- TABLA -->
  <div class="panel">
    <div class="panel-title">📋 Solicitudes</div>
    <div class="filtros">
      <select id="filtroBusq" onchange="filtrar()" style="max-width:160px;">
        <option value="">Todos</option>
        <option value="pendiente">Sin gestionar</option>
        <option value="aprobado">Gestionados</option>
      </select>
      <input type="text" id="filtroTexto" placeholder="Buscar nombre o ID…"
        oninput="filtrar()" style="max-width:220px;" />
      <span id="contadorTotal" style="font-size:.78rem;color:var(--txt2);align-self:center;"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Nombre</th><th>Teléfono</th><th>Solicitud</th>
            <th>#</th><th>Pago</th><th>Comprobante</th><th>Estado</th>
          </tr>
        </thead>
        <tbody id="tablaBody">
          <tr><td colspan="8" style="text-align:center;color:var(--txt2);padding:2rem;">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- DETALLE -->
  <div class="detail-wrap">

    <div class="placeholder" id="placeholder">
      <div style="font-size:2rem;margin-bottom:.5rem;">👆</div>
      Selecciona una solicitud de la tabla
    </div>

    <div id="detailPanel">
      <div class="panel">
        <div class="panel-title">✏️ Gestionar solicitud</div>

        <!-- Ficha -->
        <div class="ficha">
          <div class="ficha-item">
            <div class="lbl">ID</div>
            <div class="val" id="d_id">—</div>
          </div>
          <div class="ficha-item">
            <div class="lbl">Nombre</div>
            <div class="val" id="d_nombre">—</div>
          </div>
          <div class="ficha-item">
            <div class="lbl">Correo</div>
            <div class="val" id="d_correo" style="font-size:.8rem;word-break:break-all;">—</div>
          </div>
          <div class="ficha-item">
            <div class="lbl">Teléfono</div>
            <div class="val" id="d_telefono">—</div>
          </div>
          <div class="ficha-item full">
            <div class="lbl">Propiedades solicitadas</div>
            <div class="val" id="d_solicitud" style="font-weight:700;color:var(--oro-c);">—</div>
          </div>
        </div>

        <!-- Comprobante -->
        <div class="comprobante-wrap">
          <div class="lbl">Comprobante de pago</div>
          <div id="d_comprobante"><span class="sin-img">Sin comprobante</span></div>
        </div>

        <hr class="seccion-sep">

        <!-- Cantidad_Pago -->
        <div class="campo">
          <label>Cantidad_Pago — sugerido según selección (5 Bs c/u), editable</label>
          <input type="text" id="a_cant_pago" placeholder="Ej: 2" />
        </div>

        <!-- Casas_Enviar -->
        <div class="campo">
          <label>Casas_Enviar — marca las propiedades a aprobar</label>
          <div class="ms-wrap" id="msWrap">
            <div style="color:var(--txt2);font-size:.8rem;padding:.5rem;">Selecciona un cliente primero…</div>
          </div>
          <div style="font-size:.72rem;color:var(--txt2);margin-top:.3rem;" id="msSelText"></div>
        </div>

        <!-- Dir_Tel (solo lectura) -->
        <div class="campo">
          <label>Agregar_Direccion_Telefono (generado automáticamente)</label>
          <textarea id="a_dir_tel" rows="4" readonly
            style="background:#111;color:var(--verde-c);resize:none;"
            placeholder="Dirección - Teléfono - Monto de cada propiedad aprobada…"></textarea>
        </div>

        <hr class="seccion-sep">

        <!-- Observación admin -->
        <div class="campo">
          <label>Observación interna — opcional (se incluye en correo y WhatsApp)</label>
          <textarea id="a_obs_admin" rows="3"
            placeholder="Ej: El cliente pagó en efectivo. Coordinar entrega el lunes."></textarea>
        </div>

        <!-- Link WhatsApp -->
        <div class="campo" id="waWrap" style="display:none;">
          <label>Link WhatsApp generado</label>
          <a id="d_wa_link" href="#" target="_blank"
            style="display:block;font-size:.78rem;word-break:break-all;color:var(--verde-c);">—</a>
        </div>

        <!-- Acciones -->
        <div class="acciones">
          <button class="btn btn-oro btn-full" id="btnGuardar" onclick="guardar()">
            <span id="btnGuardarTxt">✅ Guardar, reservar y enviar correo</span>
            <span id="btnGuardarSpin" style="display:none;"><span class="spinner"></span> Guardando…</span>
          </button>
          <button class="btn btn-wa btn-full" id="btnWA" onclick="abrirWhatsApp()" style="display:none;">
            💬 Abrir WhatsApp
          </button>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="cerrarLightbox()">
  <div id="lb-close" onclick="cerrarLightbox()">✕</div>
  <img id="lbImg" src="" alt="Comprobante" onclick="event.stopPropagation()" />
</div>

<!-- TOAST -->
<div id="toast">
  <div class="toast-icon" id="toastIcon"></div>
  <div>
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-msg"   id="toastMsg"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
const APPS_URL = 'https://script.google.com/macros/s/AKfycbzf9oOggcWWkBjL0gUKUpr6MaMytmzriPNYMGlUe7rAJ-MTq09OcU4tNs0s9EcraQ/exec';

let clientes      = [];
let terrenos      = [];
let alquileres    = [];
let clienteActual = null;
let toastTimer    = null;

/* ══════════════════════════════════════════════════
   CARGA INICIAL
══════════════════════════════════════════════════ */
async function cargarTodo() {
  document.getElementById('tablaBody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;color:var(--txt2);padding:2rem;">Cargando…</td></tr>';
  try {
    const [rProp, rCli] = await Promise.all([
      fetch(APPS_URL).then(r => r.json()),
      fetch(APPS_URL + '?action=clientes').then(r => r.json())
    ]);
    terrenos   = rProp.terrenos   || [];
    alquileres = rProp.alquileres || [];
    clientes   = (rCli.clientes   || []).reverse();
    filtrar();
    document.getElementById('lastUpdate').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString();
  } catch(err) {
    toast('⚠️', 'Error al cargar', err.message, false);
  }
}

/* ══════════════════════════════════════════════════
   TABLA
══════════════════════════════════════════════════ */
function filtrar() {
  const filtro = document.getElementById('filtroBusq').value;
  const texto  = document.getElementById('filtroTexto').value.toLowerCase().trim();
  let lista = clientes;
  if (filtro === 'pendiente') lista = lista.filter(c => !c.casas_enviar);
  if (filtro === 'aprobado')  lista = lista.filter(c =>  !!c.casas_enviar);
  if (texto) lista = lista.filter(c =>
    (c.nombre + ' ' + c.apellido).toLowerCase().includes(texto) ||
    c.id.toLowerCase().includes(texto)
  );
  document.getElementById('contadorTotal').textContent = lista.length + ' solicitudes';
  renderTabla(lista);
}

function renderTabla(lista) {
  const tbody = document.getElementById('tablaBody');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--txt2);padding:2rem;">Sin resultados</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(c => {
    const badge = c.casas_enviar
      ? '<span class="badge badge-aprobado">Gestionado</span>'
      : '<span class="badge badge-pendiente">Pendiente</span>';
    const thumb = (c.url_pago && c.url_pago !== 'Sin comprobante')
      ? `<img class="thumb" src="${c.url_pago}" alt="pago"
           onclick="event.stopPropagation();abrirLightbox('${c.url_pago}')" />`
      : '<span class="sin-img">—</span>';
    return `<tr onclick="seleccionar('${c.id}')" data-id="${c.id}">
      <td style="font-family:monospace;font-size:.75rem;">${c.id}</td>
      <td>${c.nombre} ${c.apellido}</td>
      <td>${c.telefono || '—'}</td>
      <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;">${c.solicitud || '—'}</td>
      <td style="text-align:center;">${c.cant_casas || '—'}</td>
      <td>${c.cant_pago || '—'}</td>
      <td>${thumb}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

/* ══════════════════════════════════════════════════
   SELECCIONAR CLIENTE
══════════════════════════════════════════════════ */
function seleccionar(id) {
  clienteActual = clientes.find(c => c.id === id);
  if (!clienteActual) return;

  document.querySelectorAll('#tablaBody tr').forEach(tr => tr.classList.remove('activa'));
  const fila = document.querySelector(`#tablaBody tr[data-id="${id}"]`);
  if (fila) fila.classList.add('activa');

  document.getElementById('d_id').textContent        = clienteActual.id;
  document.getElementById('d_nombre').textContent    = clienteActual.nombre + ' ' + clienteActual.apellido;
  document.getElementById('d_correo').textContent    = clienteActual.correo   || '—';
  document.getElementById('d_telefono').textContent  = clienteActual.telefono || '—';
  document.getElementById('d_solicitud').textContent = clienteActual.solicitud || '—';

  // Comprobante
  const compWrap = document.getElementById('d_comprobante');
  if (clienteActual.url_pago && clienteActual.url_pago !== 'Sin comprobante') {
    compWrap.innerHTML = `<a href="${clienteActual.url_pago}" target="_blank">
      <img class="comprobante-img" src="${clienteActual.url_pago}" alt="Comprobante"
        onclick="event.preventDefault();abrirLightbox('${clienteActual.url_pago}')" /></a>`;
  } else {
    compWrap.innerHTML = '<span class="sin-img">Sin comprobante</span>';
  }

  // Cantidad_Pago
  const cantNum = (clienteActual.cant_pago || '').replace(/\s*Bs\s*/i, '').trim();
  document.getElementById('a_cant_pago').value = cantNum;

  // Observación
  document.getElementById('a_obs_admin').value = clienteActual.obs_admin || '';

  // Multi-select con estado de reserva
  const idsSolicitud = (clienteActual.solicitud || '')
    .split(',').map(x => x.trim()).filter(Boolean);
  construirMultiSelect(idsSolicitud);

  const casasGuardadas = (clienteActual.casas_enviar || '')
    .split(',').map(x => x.trim()).filter(Boolean);
  setSeleccionados(casasGuardadas);

  const totalSugerido = (clienteActual.solicitud || '').split(',').filter(x => x.trim()).length * 5;
  document.getElementById('a_cant_pago').value = String(totalSugerido);
    document.getElementById('a_dir_tel').value = clienteActual.dir_tel || '';

  // WhatsApp
  if (clienteActual.url_wa) {
    document.getElementById('d_wa_link').href        = clienteActual.url_wa;
    document.getElementById('d_wa_link').textContent = clienteActual.url_wa;
    document.getElementById('waWrap').style.display  = 'block';
    document.getElementById('btnWA').style.display   = 'flex';
  } else {
    document.getElementById('waWrap').style.display = 'none';
    document.getElementById('btnWA').style.display  = 'none';
  }

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('detailPanel').style.display = 'block';
}

/* ══════════════════════════════════════════════════
   MULTI-SELECT — muestra RESERVADO si ya está ocupada
══════════════════════════════════════════════════ */
function construirMultiSelect(idsSolicitud) {
  const wrap = document.getElementById('msWrap');
  let html = '';

  idsSolicitud.forEach(id => {
    // Buscar en terrenos y alquileres (datos frescos con estado actualizado)
    const t = terrenos.find(x => x.id === id);
    const a = alquileres.find(x => x.id === id);

    const estadoProp = t ? t.estado : (a ? a.estado : '');
    const estaReservado = estadoProp.toLowerCase() === 'reservado';

    const label = t
      ? `${id} — ${t.nombre || t.ubicacion || ''}`
      : a
        ? `${id} — ${a.descripcion || a.direccion || ''}`
        : id;
    const tipo = t ? 'Terreno' : a ? 'Alquiler' : '—';

    if (estaReservado) {
      // Opción deshabilitada visualmente, checkbox bloqueado
      html += `<div class="ms-opt ms-reservado">
        <input type="checkbox" data-val="${id}" disabled>
        <label>${label}</label>
        <span class="ms-tipo">${tipo}</span>
        <span class="badge-res">RESERVADO</span>
      </div>`;
    } else {
      html += `<div class="ms-opt">
        <input type="checkbox" data-val="${id}" onchange="actualizarMsTexto()">
        <label onclick="this.previousElementSibling.click()">${label}</label>
        <span class="ms-tipo">${tipo}</span>
      </div>`;
    }
  });

  wrap.innerHTML = html ||
    '<div style="color:var(--txt2);font-size:.8rem;padding:.5rem;">Sin propiedades en esta solicitud</div>';
  actualizarMsTexto();
}

function actualizarMsTexto() {
  const sel = getSeleccionados();
  document.getElementById('msSelText').textContent =
    sel.length ? 'Seleccionados: ' + sel.join(', ') : '';
}

function getSeleccionados() {
  return [...document.querySelectorAll('#msWrap input[type="checkbox"]:checked:not(:disabled)')]
    .map(cb => cb.dataset.val);
}

function setSeleccionados(ids) {
  document.querySelectorAll('#msWrap input[type="checkbox"]:not(:disabled)').forEach(cb => {
    cb.checked = ids.includes(cb.dataset.val);
  });
  actualizarMsTexto();
}

/* ══════════════════════════════════════════════════
   GUARDAR — guarda, reserva, envía correo
══════════════════════════════════════════════════ */
async function guardar() {
  if (!clienteActual) return;

  document.getElementById('btnGuardar').disabled          = true;
  document.getElementById('btnGuardarTxt').style.display  = 'none';
  document.getElementById('btnGuardarSpin').style.display = 'inline';

  const casasEnviar  = getSeleccionados().join(',');
  const cantidadPago = document.getElementById('a_cant_pago').value.trim();
  const obsAdmin     = document.getElementById('a_obs_admin').value.trim();

  const params = new URLSearchParams({
    accion:        'admin_actualizar',
    id_cliente:    clienteActual.id,
    cantidad_pago: cantidadPago,
    casas_enviar:  casasEnviar,
    enviar_correo: 'true',
    obs_admin:     obsAdmin
  });

  try {
    const resp = await fetch(APPS_URL, { method: 'POST', body: params });
    const data = await resp.json();

    if (data.status === 'OK') {
      document.getElementById('a_dir_tel').value = data.dir_tel || '';

      if (data.url_whattsapp) {
        document.getElementById('d_wa_link').href        = data.url_whattsapp;
        document.getElementById('d_wa_link').textContent = data.url_whattsapp;
        document.getElementById('waWrap').style.display  = 'block';
        document.getElementById('btnWA').style.display   = 'flex';
      }

      toast('✅', 'Guardado y correo enviado',
        'Propiedades marcadas como Reservado. Cliente: ' + clienteActual.nombre,
        true);

      await cargarTodo();
      const updated = clientes.find(c => c.id === clienteActual.id);
      if (updated) { clienteActual = updated; seleccionar(clienteActual.id); }

    } else {
      toast('⚠️', 'Error', data.mensaje || 'Algo salió mal.', false);
    }
  } catch(err) {
    toast('⚠️', 'Error de red', err.message, false);
  }

  document.getElementById('btnGuardar').disabled          = false;
  document.getElementById('btnGuardarTxt').style.display  = 'inline';
  document.getElementById('btnGuardarSpin').style.display = 'none';
}

/* ══════════════════════════════════════════════════
   WHATSAPP
══════════════════════════════════════════════════ */
function abrirWhatsApp() {
  const url = document.getElementById('d_wa_link').href;
  if (url && url !== '#') window.open(url, '_blank');
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function abrirLightbox(url) {
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function cerrarLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbImg').src = '';
}

function toast(icon, titulo, msg, ok) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent  = icon;
  document.getElementById('toastTitle').textContent = titulo;
  document.getElementById('toastMsg').textContent   = msg;
  t.style.borderColor = ok ? '#16a34a' : '#dc2626';
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarLightbox(); });

cargarTodo();
</script>
